version: 2

sources:
  - name: raw
    description: >
      Landing schema in dev.duckdb, loaded from the Kaggle "eCommerce Events
      History in Cosmetics Shop" Parquet files by scripts/load_events.py
      (idempotent per-month replace, UTC ingestion timestamp).
    schema: raw
    tables:
      - name: events
        description: One row per user event (view / cart / remove_from_cart / purchase), Oct 2019 – Feb 2020.
        columns:
          - name: event_time
            data_type: timestamp
            description: Event timestamp (UTC).
          - name: event_type
            data_type: varchar
            description: One of view, cart, remove_from_cart, purchase.
          - name: product_id
            data_type: bigint
            description: Product identifier.
          - name: category_id
            data_type: bigint
            description: Numeric category identifier.
          - name: category_code
            data_type: varchar
            description: Human-readable category path; ~98% null.
          - name: brand
            data_type: varchar
            description: Brand name; ~40% null.
          - name: price
            data_type: double
            description: Product price at event time; rare negatives on purchases look like refunds.
          - name: user_id
            data_type: bigint
            description: Persistent user identifier.
          - name: user_session
            data_type: varchar
            description: Session UUID; groups events into visits. Rarely null.
          - name: ingestion_date
            data_type: timestamp
            description: UTC datetime the row was loaded by load_events.py.
